    <title>Catalog</title>
    <style>
        body {
            background: #f4f7f6;
            padding: 20px;
        }

        #card-container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .product-card {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            width: 280px;
            background: white;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            transition: transform 0.3s;
        }

        .product-card img {
            max-width: 100%;
            object-fit: contain;
        }

        h3 {
            font-size: 16px;
            overflow: hidden;
            color: #333;
        }

        .desc {
            font-size: 13px;
            color: #777;
            height: 60px;
            overflow: hidden;
        }

        .price {
            font-size: 22px;
            font-weight: bold;
            color: #2ecc71;
            margin: 15px 0;
        }

        button {
            background: #3498db;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
        }

        button:hover {
            background: #2980b9;
        }
    </style>
</head>

            }
        ]

        let visibleCount = 12;

        function displayProducts(products) {
            const container = document.getElementById('card-container');
            const productsToShow = products.slice(0, visibleCount);

            container.innerHTML = productsToShow.map(item => {
                const title = item.productName;
                const price = item.cost;
                return `
                            <div class="product-card">
                                <img src="${item.image}" alt="${title}">
                                <div class="info">
                                    <h3>${title}</h3>
                                    <div class="price">${price} Руб.</div>
                                    <button>Купить</button>
                                </div>
                            </div>
                        `;
            }).join('');

            updateButtonVisibility(products.length);
        }

        function updateButtonVisibility(total) {
            let btn = document.getElementById('load-more');
            if (!btn) {
                btn = document.createElement('button');
                btn.id = 'load-more';
                btn.innerText = 'Показать еще';
                btn.style.cssText = 'display: block; margin: 30px auto; width: 250px;';
                btn.onclick = () => {
                    visibleCount += 12;
                    displayProducts(api);
                };
                document.body.appendChild(btn);
            }
            btn.style.display = visibleCount >= total ? 'none' : 'block';
        }
